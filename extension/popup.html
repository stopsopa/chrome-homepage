<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 15px; 
            width: 280px; 
            margin: 0;
            background-color: #fafafa;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }
        input { 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            padding: 8px 10px; 
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }
        button { 
            width: 100%; 
            padding: 8px; 
            cursor: pointer; 
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status { 
            color: #28a745; 
            display: none; 
            margin-top: 10px; 
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h3>Set New Tab URL</h3>
    <input type="url" id="linkInput" placeholder="https://example.com" />
    <button id="saveBtn">Save URL</button>
    <div id="status" class="status">Saved successfully!</div>
    <script src="popup.js"></script>
</body>
</html>
