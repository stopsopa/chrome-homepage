<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --accent-color: #1a73e8;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --shadow-strong: 0 15px 40px rgba(0, 0, 0, 0.1);
            --border-radius: 24px;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: var(--font-main);
            color: var(--text-primary);
            overflow: hidden;
        }

        .dashboard {
            text-align: center;
            padding: 60px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-strong);
            width: 90%;
            max-width: 600px;
            transition: transform 0.3s ease;
        }

        .dashboard:hover {
            transform: translateY(-5px);
        }

        #clock {
            font-size: 84px;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        #date {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-container {
            position: relative;
            margin-bottom: 30px;
        }

        #search-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 18px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 50px;
            background: white;
            box-shadow: var(--shadow-soft);
            box-sizing: border-box;
            outline: none;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        #search-input:focus {
            box-shadow: var(--shadow-strong);
            border-color: var(--accent-color);
        }

        .quick-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .link-item {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        .link-item:hover {
            background: var(--accent-color);
            color: white;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard {
            animation: fadeIn 0.8s ease-out;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div id="clock">00:00</div>
        <div id="date">Loading...</div>
        
        <form class="search-container" id="search-form">
            <input type="text" id="search-input" placeholder="Search Google..." autocomplete="off">
        </form>

        <div class="quick-links">
            <a href="https://github.com" class="link-item">GitHub</a>
            <a href="https://gmail.com" class="link-item">Gmail</a>
            <a href="https://youtube.com" class="link-item">YouTube</a>
        </div>
    </div>

    <script type="module">
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const clock = document.getElementById('clock');
            if (clock) clock.textContent = `${hours}:${minutes}`;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString(undefined, options);
            const dateEl = document.getElementById('date');
            if (dateEl) dateEl.textContent = dateStr;
        }

        setInterval(updateClock, 1000);
        updateClock();

        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        });

        // Focus search on load
        searchInput.focus();
    </script>
</body>
</html>
