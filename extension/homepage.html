<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Home</title>
    <link rel="stylesheet" href="homepage.css">
</head>
<body>
    <header>
        <div class="search-container">
            <div class="search-wrapper">
                <textarea id="search-input" placeholder="Search..." autocomplete="off" rows="1"></textarea>
                <div id="search-engines">
                    <div id="engines-top" class="engine-row"></div>
                    <div id="engines-bottom-wrapper">
                        <div id="engines-bottom" class="engine-row"></div>
                        <div id="skills-list"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-actions">
            <button id="add-skill" class="hidden">Add Skill</button>
            <button id="add-bookmark" class="hidden">Add Link</button>
            <button id="edit-toggle">Edit</button>
        </div>
    </header>

    <main id="grid-container">
        <!-- Bookmarks will be rendered here -->
    </main>

    <!-- Bookmark Dialog -->
    <dialog id="bookmark-dialog">
        <form id="bookmark-form" method="dialog">
            <header>
                <h2 id="dialog-title">Add Bookmark</h2>
            </header>
            <div class="field">
                <label for="f-title">Title</label>
                <input type="text" id="f-title" name="title" required>
            </div>
            <div class="field">
                <label for="f-url">URL</label>
                <input type="url" id="f-url" name="url" required>
            </div>
            <div class="field">
                <label for="f-logo">Logo URL</label>
                <input type="url" id="f-logo" name="logo" required>
            </div>
            <footer>
                <button type="button" id="dialog-cancel">Cancel</button>
                <button type="submit">Submit</button>
            </footer>
        </form>
    </dialog>

    <!-- Skills Management Dialog -->
    <dialog id="skills-dialog" class="fullscreen-dialog">
        <div class="skills-manager">
            <aside class="skills-sidebar">
                <h3>Skills</h3>
                <div id="skills-manager-list"></div>
                <button id="new-skill-btn">+ New Skill</button>
                <button id="close-skills-btn">Close</button>
            </aside>
            <section class="skills-editor">
                <form id="skill-form">
                    <div class="field">
                        <label>Skill Title</label>
                        <input type="text" name="title" id="skill-title" required placeholder="e.g. Code Expert">
                    </div>
                    <div class="field">
                        <label>Prompt Content</label>
                        <textarea name="content" id="skill-content" required placeholder="Prepend this to your query..."></textarea>
                    </div>
                    <footer>
                        <button type="button" id="delete-skill-btn" class="danger hidden">Delete</button>
                        <button type="submit">Save Skill</button>
                    </footer>
                </form>
            </section>
        </div>
    </dialog>

    <script type="module" src="homepage.js"></script>
</body>
</html>
